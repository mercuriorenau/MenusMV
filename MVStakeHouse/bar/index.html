<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar - MV</title>
    <link rel="icon" type="image/png" href="../public/pngzefe.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        @keyframes backgroundFloat { 0%,100%{background-position:0 0;} 50%{background-position:10px 5px;} }
        body { min-height:100vh; width:100vw; display:flex; align-items:center; justify-content:center; font-family: Arial, sans-serif;
               background-image:url('../public/Fondo.png'); background-size:150px 150px; background-repeat:repeat; animation: backgroundFloat 15s ease-in-out infinite; }
        .landing-page { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background-color: rgba(0,0,0,0.2); }
        .content-box { background: rgba(0,0,0,0.4); border:2px solid rgba(255,255,255,0.3); border-radius:25px; padding:20px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); display:flex; flex-direction:column; align-items:center; gap:12px; color:#fff; max-width:400px; }
        .logo { width:100%; height:100%; object-fit:contain; object-position: center; transform: scale(1.12); transform-origin: center; }
        .logo-frame { display:flex; align-items:center; justify-content:center; width:min(88vw, 380px); height:18vh; min-height:120px; overflow:hidden; border-radius:12px; }
        @media (max-width:767px){
            :root { --cropY: 50%; }
            .content-box { padding: 20px; gap: 12px; max-width: 420px; }
            .logo-frame { width:min(88vw, 380px); height: 18vh; overflow:hidden; border-radius:12px; }
            .logo-frame .logo { width:100%; height:100%; object-fit:cover; object-position: 50% var(--cropY); }
        }
        .menu-option { width:100%; max-width:300px; background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.05)); border:2px solid rgba(255,255,255,.4); color:#fff; padding:15px 20px; border-radius:15px; cursor:pointer; transition: all .4s cubic-bezier(.4,0,.2,1); text-align:center; font-size:18px; font-weight:500; letter-spacing:.5px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow:0 4px 15px rgba(0,0,0,.2), 0 0 0 .5px rgba(255,255,255,.1) inset; position:relative; overflow:hidden; text-decoration:none; }
        .menu-option:hover { transform: translateY(-2px); }
        .social-links { display:flex; gap:20px; }
        .lang-toggle { display:flex; gap:2px; background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.5); border-radius:999px; padding:4px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); }
        .lang-toggle button { appearance:none; border:none; color:#fff; background: transparent; padding:8px 14px; border-radius:999px; font-weight:600; cursor:pointer; transition: all .25s ease; letter-spacing:.3px; }
        .lang-toggle button.active { background:#fff; color:#111; }
        .social-button { color:#fff; font-size:24px; transition: all .4s cubic-bezier(.4,0,.2,1); background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.05)); width:45px; height:45px; display:flex; align-items:center; justify-content:center; border-radius:50%; border:2px solid rgba(255,255,255,.4); text-decoration:none; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow:0 4px 15px rgba(0,0,0,.2), 0 0 0 .5px rgba(255,255,255,.1) inset; }
        @media (max-width:767px){ body{background-size:80px 80px;} .content-box{max-width:360px; padding:18px; gap:10px; border-radius:20px;} .logo-frame{ width:min(86vw, 340px); height:17vh; min-height:110px; } }
    </style>
</head>
<body>
    <div class="landing-page">
        <div class="content-box">
            <div class="logo-frame">
                <img src="../public/MVBARLOGO.png" alt="Marea Bar & Lounge Logo" class="logo">
            </div>
            <button class="menu-option" id="openDrinksBtn">Menú Bebidas</button>
            <button class="menu-option" id="openSnacksBtn">Menú Botanas</button>
            <div class="social-links">
                <a href="https://www.facebook.com/HotelMareaVista/" class="social-button" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/mareavistahotel/?hl=en" class="social-button" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
            </div>
            <div class="lang-toggle" id="langToggle" aria-label="Cambiar idioma">
                <button type="button" class="active" data-value="es">ES</button>
                <button type="button" data-value="en">EN</button>
            </div>
        </div>
    </div>

    <!-- Placeholder: agregaremos las imágenes cuando las tengas -->
    <script>
        // Bloquear regresar a la landing desde esta página
        (function lockBackNavigation(){
            try {
                history.pushState(null, '', location.href);
                window.addEventListener('popstate', function(){
                    history.pushState(null, '', location.href);
                });
            } catch (_) {}
        })();

        const root = document.body;
        root.setAttribute('data-lang', 'es');
        const openDrinksBtn = document.getElementById('openDrinksBtn');
        const openSnacksBtn = document.getElementById('openSnacksBtn');
        const langToggle = document.getElementById('langToggle');

        function syncTexts(){
            const isEs = root.getAttribute('data-lang') === 'es';
            openDrinksBtn.textContent = isEs ? 'Menú Bebidas' : 'Drinks Menu';
            openSnacksBtn.textContent = isEs ? 'Menú Botanas' : 'Snacks Menu';
        }
        syncTexts();
        langToggle.addEventListener('click', (e)=>{
            const btn = e.target.closest('button');
            if(!btn) return;
            const val = btn.getAttribute('data-value');
            root.setAttribute('data-lang', val);
            langToggle.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            syncTexts();
        });

        openDrinksBtn.addEventListener('click', ()=>{ alert('Próximamente: Drinks Menu.'); });
        openSnacksBtn.addEventListener('click', ()=>{ alert('Próximamente: Snacks Menu.'); });
    </script>
</body>
</html>
