<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Don Zefe</title>
    <link rel="icon" type="image/png" href="/public/pngzefe.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes backgroundFloat {
            0%, 100% {
                background-position: 0px 0px;
            }
            50% {
                background-position: 10px 5px;
            }
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            background-image: url('./public/Fondo.png');
            background-size: 150px 150px;
            background-repeat: repeat;
            background-position: top left;
            background-attachment: scroll;
            animation: backgroundFloat 15s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            font-family: Arial, sans-serif;
        }

        .landing-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 2000;
            padding: 0;
        }

        .landing-page > * {
            margin-left: auto;
            margin-right: auto;
        }

        .content-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 40px 50px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo {
            width: 210px;
            height: 210px;
            margin-bottom: 0;
            border-radius: 50%;
            object-fit: cover;
        }

        .menu-option {
            width: 100%;
            max-width: 300px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2), 
                        0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        .menu-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .menu-option:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.15));
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 
                        0 0 0 0.5px rgba(255, 255, 255, 0.2) inset,
                        0 0 20px rgba(255, 255, 255, 0.1);
        }

        .menu-option:hover::before {
            left: 100%;
        }

        .menu-option:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2), 
                        0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
        }

        .social-links {
            display: flex;
            gap: 20px;
            margin-top: 0;
        }

        .social-button {
            color: #fff;
            font-size: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            text-decoration: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2), 
                        0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        .social-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .social-button:hover {
            transform: translateY(-3px) scale(1.05);
            color: #ffd700;
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3), 
                        0 0 0 0.5px rgba(255, 255, 255, 0.2) inset,
                        0 0 30px rgba(255, 215, 0, 0.2);
        }

        .social-button:hover::before {
            width: 100%;
            height: 100%;
        }

        .social-button:hover i {
            position: relative;
            z-index: 1;
        }

        .social-button:active {
            transform: translateY(-1px) scale(1.02);
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            transform: none;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 2001;
            display: none;
            font-size: 16px;
        }

        .menu-container {
            width: 100vw;
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 20px 0;
            gap: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            z-index: 1500;
            padding-bottom: 100px;
        }

        .menu-section {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .menu-section.active {
            display: flex;
        }

        .menu-page {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10px;
            position: relative;
        }

        .menu-page img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-radius: 8px;
            transform-origin: center top;
        }

        @media (max-width: 767px) {
            body {
                background-size: 80px 80px;
                overflow-x: hidden;
            }
            
            .content-box {
                padding: 30px 30px;
                border-radius: 20px;
            }
            
            .menu-option {
                max-width: 250px;
                padding: 12px 15px;
                font-size: 16px;
            }

            .logo {
                width: 250px;
                height: 250px;
            }

            .menu-container {
                padding: 10px 0;
                gap: 15px;
                padding-bottom: 80px;
            }

            .menu-page {
                padding: 0 5px;
            }

            .menu-page img {
                width: 95%;
                max-width: none;
            }

            .social-button {
                font-size: 20px;
                width: 40px;
                height: 40px;
            }
        }

        @media (max-width: 896px) and (orientation: landscape) {
            body {
                background-size: 100px 100px;
            }
            
            .menu-container {
                padding: 10px;
            }

            .menu-page img {
                height: 80vh;
                width: auto;
                max-width: none;
            }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            .menu-page img {
                max-width: 80%;
            }
        }

        @media (min-width: 1024px) and (max-width: 1439px) {
            .menu-page img {
                max-width: 70%;
            }
        }

        @media (min-width: 1440px) {
            .menu-page img {
                max-width: 60%;
            }
        }

        @supports (-webkit-touch-callout: none) {
            .menu-container {
                height: -webkit-fill-available;
            }
        }
    </style>
</head>
<body>
    <div class="landing-page">
        <div class="content-box">
            <img src="./public/Logo.png" alt="Don Zefe Logo" class="logo">
            <a class="menu-option" href="restaurant/">Restaurante</a>
            <a class="menu-option" href="bar/">Bar</a>
            <div class="social-links">
                <a href="https://www.facebook.com/HotelMareaVista/" class="social-button" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/mareavistahotel/?hl=en" class="social-button" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <button class="back-button">
        <i class="fas fa-arrow-left"></i> 
    </button>

    
</body>
</html>
