<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marea Vista Steak House</title>
    <link rel="icon" type="image/png" href="../public/menus/LOGOSTEAK.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @keyframes backgroundFloat {
            0%, 100% { background-position: 0 0; }
            50% { background-position: 18px 14px; }
        }
        body {
            min-height: 100vh;
            width: 100vw;
            position: relative;
            background-color: #0d0d0f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            z-index: 0;
            pointer-events: none;
            top: 50%;
            left: 50%;
            width: 165%;
            min-width: 900px;
            height: 165%;
            min-height: 900px;
            transform: translate(-50%, -50%) rotate(-14deg);
            transform-origin: center center;
            background-image: url('../public/menus/LOGOSTEAK.png');
            background-size: 140px auto;
            background-repeat: repeat;
            background-position: 0 0;
            opacity: 0.34;
            filter: grayscale(0.15) brightness(1.75) contrast(1.14) saturate(1.08);
            animation: backgroundFloat 22s ease-in-out infinite;
        }
        .landing-page {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.26);
        }
        .content-box { background: rgba(0,0,0,0.4); border:2px solid rgba(255,255,255,0.3); border-radius:25px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); display:flex; flex-direction:column; align-items:center; gap:12px; color:#fff; max-width: 400px; padding: 20px; }
        .logo-frame {
            display: flex;
            align-items: center;
            justify-content: center;
            width: min(90vw, 360px);
            max-height: 200px;
            background: transparent;
        }
        .logo {
            width: 100%;
            max-width: 340px;
            height: auto;
            max-height: 190px;
            object-fit: contain;
            object-position: center;
            display: block;
            filter: drop-shadow(0 4px 24px rgba(0, 0, 0, 0.45));
        }
        @media (max-width:767px){
            .content-box { max-width: 360px; padding: 18px; gap: 10px; border-radius: 20px; }
            .logo-frame { max-height: 170px; }
            .logo { max-width: 300px; max-height: 165px; }
            body::before {
                width: 180%;
                height: 180%;
                background-size: 108px auto;
                opacity: 0.28;
                transform: translate(-50%, -50%) rotate(-12deg);
                filter: grayscale(0.15) brightness(1.65) contrast(1.12) saturate(1.06);
            }
        }
        .menu-option { width:100%; max-width:300px; background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.05)); border:2px solid rgba(255,255,255,.4); color:#fff; padding:15px 20px; border-radius:15px; cursor:pointer; transition: all .4s cubic-bezier(.4,0,.2,1); text-align:center; font-size:18px; font-weight:500; letter-spacing:.5px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow:0 4px 15px rgba(0,0,0,.2), 0 0 0 .5px rgba(255,255,255,.1) inset; position:relative; overflow:hidden; text-decoration:none; }
        .menu-option:hover { transform: translateY(-2px); }
        .home-link { font-size:14px; color: rgba(255,255,255,0.85); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.35); padding-bottom: 2px; }
        .home-link:hover { color: #fff; }
        .social-links { display:flex; gap:20px; }
        .social-button { color:#fff; font-size:24px; transition: all .4s cubic-bezier(.4,0,.2,1); background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.05)); width:45px; height:45px; display:flex; align-items:center; justify-content:center; border-radius:50%; border:2px solid rgba(255,255,255,.4); text-decoration:none; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow:0 4px 15px rgba(0,0,0,.2), 0 0 0 .5px rgba(255,255,255,.1) inset; }
        @media (max-width: 896px) and (orientation: landscape) {
            body::before {
                background-size: 118px auto;
                transform: translate(-50%, -50%) rotate(-13deg);
            }
        }

        .menu-container { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:flex-start; background-color: rgba(7,7,7,0.92); gap:20px; padding:20px 0 100px; overflow-y:auto; z-index:1500; -webkit-overflow-scrolling: touch; }
        .menu-section { width:100%; display:flex; flex-direction:column; align-items:center; gap:20px; }
        .menu-page { width:100%; display:flex; justify-content:center; padding:0 10px; }
        .menu-page img { max-width:100%; height:auto; object-fit:contain; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,.3); }
        .back-button { position:fixed; top:20px; left:20px; display:none; background: rgba(0,0,0,.8); color:#fff; border:none; padding:10px 15px; border-radius:20px; cursor:pointer; z-index:2001; font-size:16px; }
        @media (max-width: 767px) { .menu-page img { width: 95%; max-width: none; } }
        @media (min-width: 1024px) { .menu-page img { max-width: 70%; } }
    </style>
</head>
<body>
    <div class="landing-page">
        <div class="content-box">
            <div class="logo-frame">
                <img src="../public/menus/LOGOSTEAK.png" alt="Marea Vista Steak House" class="logo">
            </div>
            <button type="button" class="menu-option" id="openMenuBtn">Ver menú</button>
            <a class="home-link" href="../">← Todos los menús</a>
            <div class="social-links">
                <a href="https://www.facebook.com/HotelMareaVista/" class="social-button" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/mareavistahotel/?hl=en" class="social-button" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <button type="button" class="back-button" id="backBtn" aria-label="Cerrar menú"><i class="fas fa-arrow-left"></i></button>

    <div class="menu-container" id="menuContainer">
        <div class="menu-section active">
            <div class="menu-page">
                <img src="../public/menus/mv-steakhouse-01.webp" alt="Marea Vista Steak House — menú" loading="lazy">
            </div>
        </div>
    </div>

    <script>
        (function lockBackNavigation(){
            try {
                history.pushState(null, '', location.href);
                window.addEventListener('popstate', function(){
                    history.pushState(null, '', location.href);
                });
            } catch (_) {}
        })();

        const landingPage = document.querySelector('.landing-page');
        const menuContainer = document.getElementById('menuContainer');
        const backButton = document.getElementById('backBtn');
        document.getElementById('openMenuBtn').addEventListener('click', () => {
            landingPage.style.display = 'none';
            menuContainer.style.display = 'flex';
            backButton.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'auto' });
        });
        backButton.addEventListener('click', () => {
            landingPage.style.display = 'flex';
            menuContainer.style.display = 'none';
            backButton.style.display = 'none';
        });
    </script>
</body>
</html>
